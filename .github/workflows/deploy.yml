name: Build and Push NestJS to AWS ECR & App Runner

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: hls-core-api-repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          LATEST_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG

      - name: Deploy to AWS App Runner via CLI
        env:
          SERVICE_NAME: hls-core-api-service
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          ACCESS_ROLE_ARN: ${{ secrets.APP_RUNNER_ACCESS_ROLE_ARN }}
          INSTANCE_ROLE_ARN: ${{ secrets.APP_RUNNER_INSTANCE_ROLE_ARN }}
          VPC_CONNECTOR_ARN: ${{ secrets.APP_RUNNER_VPC_CONNECTOR_ARN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: '3001'
        run: |
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceArn" --output text)

          SOURCE_CONFIG=$(jq -n \
            --arg role "$ACCESS_ROLE_ARN" \
            --arg img "$IMAGE_URI" \
            --arg port "$PORT" \
            --arg db "$DATABASE_URL" \
            '{
              AuthenticationConfiguration: { AccessRoleArn: $role },
              ImageRepository: {
                ImageIdentifier: $img,
                ImageRepositoryType: "ECR",
                ImageConfiguration: {
                  Port: $port,
                  RuntimeEnvironmentVariables: { DATABASE_URL: $db, PORT: $port }
                }
              }
            }')
            
          INSTANCE_CONFIG=$(jq -n \
            --arg role "$INSTANCE_ROLE_ARN" \
            '{
              InstanceRoleArn: $role,
              Cpu: "1 vCPU",
              Memory: "2 GB"
            }')

          NETWORK_CONFIG=$(jq -n \
            --arg vpc "$VPC_CONNECTOR_ARN" \
            '{
              EgressConfiguration: { EgressType: "VPC", VpcConnectorArn: $vpc }
            }')

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service..."
            aws apprunner create-service --service-name $SERVICE_NAME --source-configuration "$SOURCE_CONFIG" --instance-configuration "$INSTANCE_CONFIG" --network-configuration "$NETWORK_CONFIG"
          else
            echo "Updating existing App Runner service..."
            aws apprunner update-service --service-arn $SERVICE_ARN --source-configuration "$SOURCE_CONFIG" --instance-configuration "$INSTANCE_CONFIG" --network-configuration "$NETWORK_CONFIG"
          fi
